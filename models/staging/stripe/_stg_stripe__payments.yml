version: 2

models:
  - name: stg_stripe__payments
    description: "{{ doc('stg_stripe__payments_description') }}"
    columns:
      - name: payment_id
        description: A unique identifier for each payment. Primary key.
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: The identifier for the order associated with the payment. order foreign key.
        data_tests:
          - not_null
      - name: payment_method
        description: "{{ doc('stripe_payment_method') }}"
        data_tests:
          - accepted_values:
              values: [credit_card, bank_transfer, coupon, gift_card]
      - name: payment_status
        description: The current status of the payment. success or fail.
        data_tests:
          - accepted_values:
              values: [success, fail]
      - name: payment_created
        description: The date when the payment was created.
      - name: _batched_at
        description: The datetime when the payment record was batched for processing.
      - name: payment_amount
        description: The total amount of the payment, converted to a standard currency unit.